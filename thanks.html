    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .check-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.15);
            border: 2px solid #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            animation: pop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .email-note {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            border-radius: 2px;
            margin: 0 auto 2rem;
        }

        .stay-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            width: 100%;
            padding: 1rem;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Heebo', sans-serif;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            margin-bottom: 0.8rem;
        }

        .btn svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
        }

        .btn-instagram {

        .btn-instagram:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(225, 48, 108, 0.4);

        .whatsapp-note {

            color: #94a3b8;
            margin-top: -0.3rem;
            margin-bottom: 1rem;

        .footer-note {

        .event-reminder {

            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.15);
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .event-reminder strong {

</head>
