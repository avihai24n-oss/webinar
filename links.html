    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0B0D14;
            --card: rgba(255,255,255,0.06);
            --card-hover: rgba(255,255,255,0.10);
            --border: rgba(255,255,255,0.08);
            --accent: #A3E635;
            --accent2: #06b6d4;
            --white: #FFFFFF;
            --gray: #9CA3AF;
            --light: #D1D5DB;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            direction: rtl;
            position: relative;
            overflow-x: hidden;
        }

        #neuralBg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            padding: 3rem 1.2rem 2rem;
            position: relative;
            z-index: 1;
        }

        /* ===== PROFILE ===== */
        .profile { text-align: center; margin-bottom: 2rem; }

        .avatar {
            width: 110px; height: 110px;
            border-radius: 50%; overflow: hidden;
            margin: 0 auto 1rem;
            border: 3px solid rgba(163,230,53,0.3);
            box-shadow: 0 0 30px rgba(163,230,53,0.1);
            position: relative;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar::after {
            content: ''; position: absolute; inset: -3px;
            border-radius: 50%; border: 2px solid transparent;
            background: linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; -webkit-mask-composite: xor;
        }

        .profile-name {
            font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem;
            background: linear-gradient(135deg, var(--white), var(--light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .profile-bio { font-size: 0.95rem; color: var(--gray); line-height: 1.5; margin-bottom: 1rem; }

        .social-icons { display: flex; gap: 0.8rem; justify-content: center; }
        .social-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--card); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: all 0.3s ease;
        }
        .social-icon:hover { background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .social-icon svg { width: 18px; height: 18px; fill: var(--light); }

        /* ===== LINKS ===== */
        .links { display: flex; flex-direction: column; gap: 0.8rem; }

        .link-wrapper { position: relative; }

        .link-card {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 1.2rem;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; text-decoration: none; color: var(--white);
            transition: all 0.3s ease; position: relative; overflow: hidden;
            cursor: pointer;
        }
        .link-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(163,230,53,0.03) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .link-card:hover { background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); border-color: rgba(163,230,53,0.15); }
        .link-card:hover::before { opacity: 1; }
        .link-card:active { transform: scale(0.98); }

        .link-card.featured-card {
            border-color: rgba(163,230,53,0.2);
            background: linear-gradient(135deg, rgba(163,230,53,0.06) 0%, rgba(163,230,53,0.02) 100%);
        }

        .featured-badge {
            position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #0B0D14;
            font-size: 0.6rem; font-weight: 700;
            padding: 0.15rem 0.6rem; border-radius: 0 0 8px 8px;
        }

        .discount-badge {
            position: absolute; top: -10px; left: 12px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white; font-size: 0.7rem; font-weight: 800;
            padding: 0.25rem 0.7rem; border-radius: 10px;
            box-shadow: 0 4px 14px rgba(239,68,68,0.45);
            z-index: 4;
            animation: pulseBadge 2s ease-in-out infinite;
        }
        @keyframes pulseBadge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .link-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 1.3rem;
            background: linear-gradient(135deg, rgba(163,230,53,0.12), rgba(163,230,53,0.04));
        }

        .link-icon.whatsapp-icon {
            background: linear-gradient(135deg, #25d366, #128c7e);
        }
        .link-icon.whatsapp-icon svg {
            width: 26px; height: 26px; fill: white;
        }

        /* ===== QUICK ACTIONS (bottom squares) ===== */
        .quick-actions {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .quick-action {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            background: var(--card); border: 1px solid var(--border);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }
        .quick-action:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .quick-action svg { width: 24px; height: 24px; }
        .quick-action.instagram svg { fill: url(#igGradient); }
        .quick-action.phone svg { fill: #A3E635; }
        .quick-action .qa-label {
            position: absolute;
            bottom: -22px; left: 50%; transform: translateX(-50%);
            font-size: 0.7rem; color: var(--gray);
            white-space: nowrap;
        }
        .link-text { flex: 1; position: relative; z-index: 1; }
        .link-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.15rem; }
        .link-sub { font-size: 0.75rem; color: var(--gray); }
        .link-arrow { color: var(--gray); font-size: 0.9rem; position: relative; z-index: 1; transition: transform 0.3s ease; }
        .link-card:hover .link-arrow { transform: translateX(-4px); }

        /* ===== ADMIN ===== */
        .admin-bar {
            display: none;
            background: rgba(163,230,53,0.1);
            border: 1px solid rgba(163,230,53,0.3);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .admin-bar.show { display: block; }
        .admin-bar span { color: var(--accent); font-weight: 700; font-size: 0.85rem; }

        .click-count {
            display: none;
            position: absolute;
            top: 8px; left: 8px;
            background: rgba(163,230,53,0.15);
            border: 1px solid rgba(163,230,53,0.3);
            border-radius: 8px;
            padding: 0.15rem 0.5rem;
            font-size: 0.65rem;
            color: var(--accent);
            font-weight: 700;
            z-index: 5;
        }
        body.admin-mode .click-count { display: block; }

        .admin-actions {
            display: none;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        body.admin-mode .admin-actions { display: flex; }

        .admin-btn {
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--light);
            font-size: 0.7rem;
            font-family: 'Heebo', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .admin-btn:hover { background: var(--card-hover); }
        .admin-btn.danger { border-color: rgba(239,68,68,0.3); color: #f87171; }
        .admin-btn.danger:hover { background: rgba(239,68,68,0.1); }

        /* Edit modal */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: #1C1F2B;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2rem;
            width: 90%; max-width: 400px;
            direction: rtl;
        }
        .modal h3 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--white); }
        .modal label { font-size: 0.8rem; color: var(--gray); display: block; margin-bottom: 0.3rem; margin-top: 0.8rem; }
        .modal input, .modal select {
            width: 100%; padding: 0.6rem 0.8rem;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; color: var(--white);
            font-family: 'Heebo', sans-serif; font-size: 0.9rem;
            direction: rtl;
        }
        .modal input:focus { outline: none; border-color: var(--accent); }

        .modal-buttons { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
        .modal-btn {
            flex: 1; padding: 0.7rem;
            border-radius: 10px; border: none;
            font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
        }
        .modal-btn.save { background: var(--accent); color: #0B0D14; }
        .modal-btn.save:hover { box-shadow: 0 4px 15px rgba(163,230,53,0.3); }
        .modal-btn.cancel { background: var(--card); color: var(--light); border: 1px solid var(--border); }

        .footer { text-align: center; margin-top: 2.5rem; padding-bottom: 1rem; }
        .footer-brand { font-size: 0.8rem; font-weight: 700; color: var(--gray); letter-spacing: 1px; }
        .footer-brand span { color: var(--accent); }

        .fade-up {
            opacity: 0; transform: translateY(15px);
            animation: fadeUp 0.5s ease forwards;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 768px) { .container { padding-top: 4rem; } }
    </style>
</head>

    const SUPABASE_URL = 'https://vvsvbiudqzislexwzzlk.supabase.co';

    // Supabase REST helper
    async function sbFetch(table, method, body, filters) {
        let url = SUPABASE_URL + '/rest/v1/' + table;
        if (filters) url += '?' + filters;
        const opts = {
            method: method || 'GET',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json',
                'Prefer': method === 'POST' ? 'return=representation' : (method === 'PATCH' ? 'return=representation' : '')
            }
        };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        if (method === 'DELETE') return true;
        return res.json();
    }

            const IG_SVG = '<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>';
            const PHONE_SVG = '<svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>';

            // Filter: Contact (wa.me/972) and Instagram go to bottom quick actions
            const mainLinks = [];
            const quickLinks = [];
            links.forEach(function(link) {
                const url = (link.url || '').toLowerCase();
                const isPhoneContact = url.indexOf('wa.me/972') !== -1 || url.indexOf('tel:') === 0;
                const isInstagram = url.indexOf('instagram.com') !== -1;
                if (isPhoneContact || isInstagram) {
                    quickLinks.push({ link: link, type: isPhoneContact ? 'phone' : 'instagram' });
                } else {
                    mainLinks.push(link);
                }
            });

            // Render main links
            mainLinks.forEach(function(link, i) {
                const wrapper = document.createElement('div');
                wrapper.className = 'link-wrapper';
                wrapper.style.animationDelay = (i * 0.08) + 's';

                const opacity = (!link.visible && isAdmin) ? 'opacity: 0.4;' : '';

                // Detect special link types
                const urlLower = (link.url || '').toLowerCase();
                const titleLower = (link.title || '').toLowerCase();
                const isWhatsApp = urlLower.indexOf('chat.whatsapp.com') !== -1 || urlLower.indexOf('whatsapp.com') !== -1;
                const isCourse = urlLower.indexOf('course.todowith') !== -1 || urlLower.indexOf('todowith.ai/howto') !== -1 || titleLower.indexOf('\u05e1\u05d8\u05d5\u05d3\u05d9\u05d5 \u05d1\u05db\u05d9\u05e1') !== -1;

                const iconHtml = isWhatsApp
                    ? '<div class="link-icon whatsapp-icon">' + WHATSAPP_SVG + '</div>'
                    : '<div class="link-icon">' + link.icon + '</div>';

                const discountBadge = isCourse ? '<span class="discount-badge">50% \u05d4\u05e0\u05d7\u05d4</span>' : '';

                wrapper.innerHTML =
                    '<a href="' + link.url + '" target="_blank" class="link-card fade-up ' + (link.featured ? 'featured-card' : '') + '" ' +
                    'data-id="' + link.id + '" style="animation-delay:' + (i * 0.08) + 's;' + opacity + '">' +
                        discountBadge +
                        (link.featured ? '<span class="featured-badge">\u05d7\u05d3\u05e9!</span>' : '') +
                        '<span class="click-count" id="clicks-' + link.id + '">' + (clickCounts[link.id] || 0) + ' \u05e7\u05dc\u05d9\u05e7\u05d9\u05dd</span>' +
                        iconHtml +
                        '<div class="link-text">' +
                            '<div class="link-title">' + link.title + '</div>' +
                            (link.subtitle ? '<div class="link-sub">' + link.subtitle + '</div>' : '') +
                        '</div>' +
                        '<span class="link-arrow">\u2190</span>' +
                    '</a>' +
                    '<div class="admin-actions">' +
                        '<button class="admin-btn" onclick="openEdit(' + link.id + ')">\u270f\ufe0f \u05e2\u05e8\u05d9\u05db\u05d4</button>' +
                        '<button class="admin-btn" onclick="toggleVisible(' + link.id + ', ' + link.visible + ')">' +
                            (link.visible ? '\ud83d\udeab \u05d4\u05e1\u05ea\u05e8' : '\u2705 \u05d4\u05e6\u05d2') +
                        '</button>' +
                    '</div>';

                container.appendChild(wrapper);
            });

            // Render quick actions at bottom
            quickLinks.forEach(function(item) {
                const link = item.link;
                const type = item.type;
                const svg = type === 'phone' ? PHONE_SVG : IG_SVG;
                const label = type === 'phone' ? '\u05e6\u05d5\u05e8 \u05e7\u05e9\u05e8' : '\u05d0\u05d9\u05e0\u05e1\u05d8\u05d2\u05e8\u05dd';
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.className = 'quick-action ' + type;
                a.setAttribute('data-id', link.id);
                a.setAttribute('aria-label', label);
                a.innerHTML = svg + '<span class="qa-label">' + label + '</span>';
                quickActionsEl.appendChild(a);
            });

            // Click tracking for main links
            container.querySelectorAll('.link-card[data-id]').forEach(function(card) {
                card.addEventListener('click', function() {
                    const linkId = parseInt(this.getAttribute('data-id'));
                    sbFetch('linktree_clicks', 'POST', { link_id: linkId });
                    var title = this.querySelector('.link-title').textContent;
                    fbq('trackCustom', 'LinkClick', { link: title });
                });
            });

            // Click tracking for quick actions
            quickActionsEl.querySelectorAll('.quick-action[data-id]').forEach(function(el) {
                el.addEventListener('click', function() {
                    const linkId = parseInt(this.getAttribute('data-id'));
                    sbFetch('linktree_clicks', 'POST', { link_id: linkId });
                    var label = this.querySelector('.qa-label').textContent;
                    fbq('trackCustom', 'LinkClick', { link: label });
                });
            });

        } catch (err) {
            container.innerHTML = '<div style="text-align:center;color:#f87171;padding:2rem;">\u05e9\u05d2\u05d9\u05d0\u05d4 \u05d1\u05d8\u05e2\u05d9\u05e0\u05d4</div>';
            console.error(err);
        }
    }

    // Edit modal
    let allLinks = [];

    async function openEdit(id) {
        event.preventDefault();
        event.stopPropagation();
        const links = await sbFetch('linktree_links', 'GET', null, 'id=eq.' + id);
        const link = links[0];
        document.getElementById('editId').value = link.id;
        document.getElementById('editTitle').value = link.title;
        document.getElementById('editSubtitle').value = link.subtitle || '';
        document.getElementById('editUrl').value = link.url;
        document.getElementById('editIcon').value = link.icon;
        document.getElementById('editFeatured').value = String(link.featured);
        document.getElementById('editVisible').value = String(link.visible);
        document.getElementById('editModal').classList.add('show');
    }

    async function saveEdit() {
        const id = document.getElementById('editId').value;
        await sbFetch('linktree_links', 'PATCH', {
            title: document.getElementById('editTitle').value,
            subtitle: document.getElementById('editSubtitle').value,
            url: document.getElementById('editUrl').value,
            icon: document.getElementById('editIcon').value,
            featured: document.getElementById('editFeatured').value === 'true',
            visible: document.getElementById('editVisible').value === 'true'
        }, 'id=eq.' + id);
        closeModal();
        loadLinks();
    }

    async function toggleVisible(id, currentState) {
        event.preventDefault();
        event.stopPropagation();
        await sbFetch('linktree_links', 'PATCH', { visible: !currentState }, 'id=eq.' + id);
        loadLinks();
    }

    function closeModal() {
        document.getElementById('editModal').classList.remove('show');
    }

    // Close modal on overlay click
    document.getElementById('editModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // Load on start
    loadLinks();
    </script>

    <script>
    // ===== NEURAL NETWORK BACKGROUND =====
    (function() {
        const canvas = document.getElementById('neuralBg');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        let w, h;
        const NODE_COUNT = 85;
        const CONNECTION_DIST = 180;
        const SPEED = 0.5;

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }

        function createNodes() {
            nodes = [];
            for (let i = 0; i < NODE_COUNT; i++) {
                nodes.push({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * SPEED, vy: (Math.random() - 0.5) * SPEED,
                    r: Math.random() * 1.5 + 0.5, pulse: Math.random() * Math.PI * 2
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];
                n.x += n.vx; n.y += n.vy; n.pulse += 0.025;
                if (n.x < 0 || n.x > w) n.vx *= -1;
                if (n.y < 0 || n.y > h) n.vy *= -1;
                n.x = Math.max(0, Math.min(w, n.x));
                n.y = Math.max(0, Math.min(h, n.y));
            }
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECTION_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        const alpha = (1 - dist / CONNECTION_DIST) * 0.25;
                        const grad = ctx.createLinearGradient(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
                        grad.addColorStop(0, 'rgba(59, 130, 246, ' + alpha + ')');
                        grad.addColorStop(0.5, 'rgba(139, 92, 246, ' + (alpha * 0.7) + ')');
                        grad.addColorStop(1, 'rgba(6, 182, 212, ' + alpha + ')');
                        ctx.strokeStyle = grad;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];
                const glow = 0.4 + Math.sin(n.pulse) * 0.25;
                const colors = [
                    [59, 130, 246],
                    [139, 92, 246],
                    [6, 182, 212]
                ];
                const c = colors[i % 3];
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r * 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ', ' + (glow * 0.1) + ')'; ctx.fill();
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r * 1.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ', ' + glow + ')'; ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        resize(); createNodes(); draw();
        window.addEventListener('resize', function() { resize(); createNodes(); });
    })();
    </script>
